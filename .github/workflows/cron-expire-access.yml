name: ⏰ Expire & Nudge Cron

on:
  schedule:
    # Every hour
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  expire-access:
    runs-on: ubuntu-latest
    steps:
      - name: Call expire-access cron
        run: |
          curl -sSf -X GET \
            "https://telegram-referral-bot-gules.vercel.app/api/cron/expire-access" \
            -H "Authorization: Bearer *** secrets.CRON_SECRET }}" \
            -w "\nHTTP %{http_code}"
